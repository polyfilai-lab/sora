<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6fafe">
  <title>{% block title %}Sora{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='sora.css') }}">
</head>
<body class="{% if active == 'frame' %}is-frame{% endif %}">
  <header class="sora-topbar">
    <a href="/" class="sora-brand">
      <span class="sora-mark">S</span>
      <span>
        <span class="sora-name">Sora</span>
        <span class="sora-tag">Blue sky</span>
      </span>
    </a>

    <button class="cmd-trigger" type="button" onclick="Sora.openPalette()" aria-label="Search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <span>Search projects, companies, tools…</span>
      <span class="cmd-trigger-hint">⌘K</span>
    </button>

    <nav class="sora-topnav">
      <a href="/"      class="sora-navlink {% if active=='dashboard' %}is-active{% endif %}">Hub</a>
      <a href="/frame" class="sora-navlink {% if active=='frame'     %}is-active{% endif %}">Frame</a>
      <button class="btn btn-sm" onclick="Sora.syncRailway()" title="Pull live URLs from Railway">⟲ Sync</button>
    </nav>
  </header>

  <main class="sora-main">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
